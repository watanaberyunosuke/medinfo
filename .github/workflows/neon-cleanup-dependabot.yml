name: Cleanup dependabot Neon branches

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install Neon CLI
        run: |
          npm install -g neonctl
          neonctl --version

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Expire dependabot branches
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          neonctl branches list --project-id "$PROJECT_ID" --output json \
          | jq -r '.branches[].name' \
          | grep '^dependabot/' || true \
          | while read branch; do
              echo "Expiring branch: $branch"
              neonctl branches update "$branch" \
                --project-id "$PROJECT_ID" \
                --ttl 24h || true
            done
