name: Cleanup Neon preview branches

on:
  schedule:
    # Runs daily at 3am Melbourne time (AEDT = UTC+11)
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch branches from Neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          echo "Fetching branches..."

          curl -sL \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches" \
            > branches.json

          echo "All branches:"
          jq -r '.branches[].name' branches.json

      - name: Delete preview branches safely
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          echo "Cleaning preview branches..."

          jq -c '.branches[] 
            | select(
                (.name | startswith("preview/dependabot/")) or
                (.name | startswith("preview/vercel/"))
              )
            | select(.primary == false)
            | select(.default == false)
            | select(.protected == false)
          ' branches.json \
          | while read branch; do

              BRANCH_ID=$(echo "$branch" | jq -r '.id')
              BRANCH_NAME=$(echo "$branch" | jq -r '.name')

              echo "Deleting branch: $BRANCH_NAME ($BRANCH_ID)"

              curl -sL -X DELETE \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches/$BRANCH_ID"

              echo ""
          done

          echo "Cleanup complete."