name: Cleanup dependabot Neon branches

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install Neon CLI
        run: |
          curl -L https://github.com/neondatabase/neonctl/releases/latest/download/neonctl-linux-amd64.tar.gz -o neon.tar.gz
          tar -xzf neon.tar.gz
          sudo mv neonctl /usr/local/bin/neon
          neon --version

      - name: Authenticate Neon CLI
        run: neon auth --api-key "${{ secrets.NEON_API_KEY }}"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Expire dependabot branches
        env:
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          neon branches list --project-id "$PROJECT_ID" --output json \
          | jq -r '.branches[].name' \
          | grep '^dependabot/' || true \
          | while read branch; do
              echo "Expiring branch: $branch"
              neon branches update "$branch" \
                --project-id "$PROJECT_ID" \
                --ttl 24h || true
            done