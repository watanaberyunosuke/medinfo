name: Cleanup Neon dependabot branches

on:
  schedule:
    - cron: "0 16 * * *"   # daily 3am Melbourne
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch branches from Neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          curl -sL \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches" \
            > branches.json

      - name: Delete dependabot branches from this repo only
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          echo "Target GitHub repo: $GITHUB_REPO"

          jq -c --arg repo "$GITHUB_REPO" '
            .branches[]
            | select(.primary == false)
            | select(.default == false)
            | select(.protected == false)
            | select(.name | startswith("preview/dependabot/"))
            | select(
                .id as $id
                | .project_id as $project
                | (
                    input.annotations[$id].value."vercel-commit-repo" == $repo
                  )
              )
          ' branches.json branches.json \
          | while read branch; do

              BRANCH_ID=$(echo "$branch" | jq -r '.id')
              BRANCH_NAME=$(echo "$branch" | jq -r '.name')

              echo "Deleting Dependabot branch from this repo: $BRANCH_NAME"

              curl -sL -X DELETE \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches/$BRANCH_ID"

              echo ""
          done

          echo "Cleanup complete."