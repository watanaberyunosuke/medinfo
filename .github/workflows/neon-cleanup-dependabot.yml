name: Cleanup Neon dependabot branches

on:
  schedule:
    - cron: "0 16 * * *"   # daily (3am Melbourne AEDT)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Neon branches
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          curl -sL \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches" \
            > branches.json

          echo "Dependabot branches found:"
          jq -r '.branches[].name | select(startswith("preview/dependabot/"))' branches.json

      - name: Expire dependabot branches
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          jq -c '.branches[] | select(.name | startswith("preview/dependabot/"))' branches.json \
          | while read branch; do

              BRANCH_ID=$(echo "$branch" | jq -r '.id')
              BRANCH_NAME=$(echo "$branch" | jq -r '.name')

              echo "Expiring $BRANCH_NAME ($BRANCH_ID)"

              curl -sL -X PATCH \
                -H "Authorization: Bearer $NEON_API_KEY" \
                -H "Content-Type: application/json" \
                "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches/$BRANCH_ID" \
                -d '{"expires_at":"'"$(date -u -d '+24 hours' +%Y-%m-%dT%H:%M:%SZ)"'"}'

          done